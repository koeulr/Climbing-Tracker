<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IBP Planning Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #181c26;
    --surface2: #1e2333;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0;
    --text2: #8b91a8;
    --text3: #555d78;
    --accent: #4f8ef7;
    --accent2: #2d5fc4;
    --green: #3ecf8e;
    --amber: #f5a623;
    --red: #f06b6b;
    --font: 'DM Sans', system-ui, sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    background: var(--surface);
  }

  .logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 500; color: #fff;
    font-family: var(--mono);
    flex-shrink: 0;
  }

  .header-title { font-size: 14px; font-weight: 500; }
  .header-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    margin-left: auto;
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--green);
  }
  .status-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg { display: flex; gap: 12px; max-width: 780px; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .avatar {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; flex-shrink: 0; margin-top: 2px;
  }
  .avatar.user-av { background: var(--accent2); color: #fff; }
  .avatar.agent-av { background: var(--surface2); border: 1px solid var(--border2); color: var(--accent); font-family: var(--mono); }

  .bubble {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.65;
    max-width: 640px;
  }
  .msg.user .bubble {
    background: var(--accent2);
    color: #fff;
    border-radius: 10px 2px 10px 10px;
  }
  .msg.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px 10px 10px 10px;
    color: var(--text);
  }

  .tool-call {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-left: 2px solid var(--accent);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    margin: 4px 0;
  }
  .tool-call .tool-name { color: var(--accent); font-weight: 500; margin-bottom: 3px; }
  .tool-call .tool-args { color: var(--text3); white-space: pre-wrap; word-break: break-all; }

  .tool-result {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 2px solid var(--green);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    margin: 4px 0;
    max-height: 160px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .thinking {
    display: flex; gap: 4px; align-items: center;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px 10px 10px 10px;
  }
  .thinking span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text3);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,60%,100% { opacity: 0.2; transform: scale(0.8); } 30% { opacity: 1; transform: scale(1); } }

  .input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 12px;
    transition: border-color 0.15s;
  }
  .input-row:focus-within { border-color: var(--accent); }

  #user-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: var(--font); font-size: 14px;
    resize: none; max-height: 120px; line-height: 1.5;
  }
  #user-input::placeholder { color: var(--text3); }

  #send-btn {
    width: 32px; height: 32px; border-radius: 7px;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s, opacity 0.15s;
  }
  #send-btn:hover { background: #3a7ef0; }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  #send-btn svg { width: 14px; height: 14px; fill: #fff; }

  .suggestions {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;
  }
  .sug {
    font-size: 12px; color: var(--text2);
    border: 1px solid var(--border2);
    border-radius: 20px; padding: 5px 12px;
    cursor: pointer; background: var(--surface2);
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .sug:hover { border-color: var(--accent); color: var(--accent); }

  .api-warning {
    background: rgba(245,166,35,0.1);
    border: 1px solid rgba(245,166,35,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--amber);
    margin-bottom: 12px;
    display: none;
  }
  .api-warning a { color: var(--amber); }

  .key-row {
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  #api-key-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border2);
    border-radius: 7px; padding: 7px 10px; color: var(--text);
    font-family: var(--mono); font-size: 12px; outline: none;
  }
  #api-key-input:focus { border-color: var(--accent); }
  #api-key-input::placeholder { color: var(--text3); }
  #save-key-btn {
    padding: 7px 14px; border-radius: 7px; border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text); font-size: 12px;
    cursor: pointer; white-space: nowrap;
  }
  #save-key-btn:hover { border-color: var(--accent); color: var(--accent); }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    color: var(--text3); font-size: 13px; text-align: center;
  }
  .empty-icon { font-size: 32px; margin-bottom: 4px; opacity: 0.4; }
</style>
</head>
<body>

<header>
  <div class="logo">IBP</div>
  <div>
    <div class="header-title">Planning Agent</div>
    <div class="header-sub">SAP IBP · MCP · Claude</div>
  </div>
  <div class="status-dot" id="status-dot" title="MCP server status"></div>
</header>

<div class="chat-area" id="chat"></div>

<div class="input-area">
  <div class="api-warning" id="api-warning">
    Anthropic API Key required. Get one at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
  </div>
  <div class="key-row" id="key-row">
    <input id="api-key-input" type="password" placeholder="sk-ant-... (Anthropic API Key)" />
    <button id="save-key-btn" onclick="saveKey()">Save key</button>
  </div>
  <div class="suggestions" id="suggestions">
    <div class="sug" onclick="suggest(this)">Show key figure catalog</div>
    <div class="sug" onclick="suggest(this)">Forecast for P-100 in WH-DE Jan–Jun 2025</div>
    <div class="sug" onclick="suggest(this)">Simulate +15% on Jan–Jun 2025 forecast</div>
    <div class="sug" onclick="suggest(this)">Compare actuals vs forecast for P-100</div>
  </div>
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="Ask about planning data, forecasts, simulations…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 16 16"><path d="M1 8l13-7-5 7 5 7z"/></svg>
    </button>
  </div>
</div>

<script>
const MCP_BASE = 'https://btp-mcp-server-balanced-llama-rg.cfapps.ap21.hana.ondemand.com/mcp';
const ANTHROPIC_API = 'https://api.anthropic.com/v1/messages';

let mcpSessionId = null;
let conversationHistory = [];
let apiKey = localStorage.getItem('ibp_agent_key') || '';

const IBP_TOOLS = [
  {
    name: "ibp_get_keyfigure_catalog",
    description: "Returns available SAP IBP key figures with metadata. Use to discover what data is available.",
    input_schema: {
      type: "object",
      properties: {
        category: { type: "string", enum: ["forecast","actuals","inventory","other"], description: "Optional filter by category" }
      }
    }
  },
  {
    name: "ibp_read_planning_data",
    description: "Reads SAP IBP planning data for a key figure, product, location and time range.",
    input_schema: {
      type: "object",
      properties: {
        keyFigure: { type: "string", description: "Key figure name e.g. FINALDEMANDQTY, ACTUALSQTY" },
        product: { type: "string", description: "Product ID e.g. P-100" },
        location: { type: "string", description: "Location ID e.g. WH-DE" },
        startPeriod: { type: "string", pattern: "^\\d{4}-\\d{2}$", description: "Start period YYYY-MM" },
        endPeriod: { type: "string", pattern: "^\\d{4}-\\d{2}$", description: "End period YYYY-MM" },
        planningArea: { type: "string", description: "Optional planning area" },
        customer: { type: "string", description: "Optional customer ID" }
      },
      required: ["keyFigure","startPeriod","endPeriod"]
    }
  },
  {
    name: "ibp_simulate_forecast_change",
    description: "Simulates a forecast adjustment (percentage or absolute) without writing to IBP. Returns old, new, and delta values.",
    input_schema: {
      type: "object",
      properties: {
        periods: {
          type: "array",
          items: { type: "object", properties: { period: { type: "string" }, value: { type: "number" } }, required: ["period","value"] },
          description: "Array of period/value pairs to adjust"
        },
        adjustmentType: { type: "string", enum: ["percentage","absolute"] },
        adjustmentValue: { type: "number", description: "Percentage (e.g. 10 = +10%) or absolute delta" }
      },
      required: ["periods","adjustmentType","adjustmentValue"]
    }
  }
];

const SYSTEM_PROMPT = `You are an SAP IBP Planning Agent. You help supply chain planners analyze forecasts, understand planning data, and simulate adjustments.

You have access to three tools:
- ibp_get_keyfigure_catalog: discover available key figures
- ibp_read_planning_data: read forecast, actuals, or inventory data
- ibp_simulate_forecast_change: simulate forecast adjustments

When presenting data, format it clearly. For time series, show values per period. For simulations, highlight the delta. 
Be concise and business-oriented. Use supply chain terminology naturally.
If the user asks about a product/location without specifying, use P-100 / WH-DE as defaults and mention it.`;

// Init
updateKeyUI();
checkMcpHealth();

async function checkMcpHealth() {
  try {
    const r = await fetch(MCP_BASE.replace('/mcp','') + '/health');
    document.getElementById('status-dot').className = r.ok ? 'status-dot' : 'status-dot offline';
  } catch {
    document.getElementById('status-dot').className = 'status-dot offline';
  }
}

function updateKeyUI() {
  const hasKey = !!apiKey;
  document.getElementById('key-row').style.display = hasKey ? 'none' : 'flex';
  document.getElementById('api-warning').style.display = hasKey ? 'none' : 'block';
  document.getElementById('send-btn').disabled = !hasKey;
  if (hasKey) showEmptyState();
}

function saveKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-ant-')) { alert('Key should start with sk-ant-'); return; }
  apiKey = val;
  localStorage.setItem('ibp_agent_key', val);
  updateKeyUI();
}

function showEmptyState() {
  const chat = document.getElementById('chat');
  if (chat.children.length === 0) {
    chat.innerHTML = `<div class="empty-state"><div class="empty-icon">◈</div><div>Ask me anything about your IBP planning data</div></div>`;
  }
}

function clearEmptyState() {
  const es = document.querySelector('.empty-state');
  if (es) es.remove();
}

function suggest(el) {
  document.getElementById('user-input').value = el.textContent;
  sendMessage();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function appendMsg(role, content) {
  clearEmptyState();
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = `avatar ${role === 'user' ? 'user-av' : 'agent-av'}`;
  av.textContent = role === 'user' ? 'U' : 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (typeof content === 'string') {
    bubble.textContent = content;
  } else {
    bubble.appendChild(content);
  }

  div.appendChild(av);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function appendThinking() {
  clearEmptyState();
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'thinking-msg';

  const av = document.createElement('div');
  av.className = 'avatar agent-av';
  av.textContent = 'AI';

  const t = document.createElement('div');
  t.className = 'thinking';
  t.innerHTML = '<span></span><span></span><span></span>';

  div.appendChild(av);
  div.appendChild(t);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeThinking() {
  const el = document.getElementById('thinking-msg');
  if (el) el.remove();
}

// MCP calls
async function mcpInit() {
  const resp = await fetch(MCP_BASE, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json, text/event-stream' },
    body: JSON.stringify({ jsonrpc:'2.0', id:1, method:'initialize', params:{ protocolVersion:'2024-11-05', capabilities:{}, clientInfo:{ name:'ibp-agent', version:'1.0' } } })
  });
  const sid = resp.headers.get('mcp-session-id') || resp.headers.get('Mcp-Session-Id');
  if (sid) mcpSessionId = sid;
  await resp.text();
}

function parseSSE(text) {
  const t = text.trim();
  if (t.startsWith('{')) {
    const p = JSON.parse(t);
    if (p.error) throw new Error(p.error.message);
    return JSON.parse(p.result?.content?.[0]?.text);
  }
  const lines = t.split('\n').filter(l => l.startsWith('data:')).map(l => l.replace(/^data:\s*/,'')).filter(l => l && l !== '[DONE]');
  if (!lines.length) throw new Error('Empty SSE response');
  const p = JSON.parse(lines[lines.length-1]);
  if (p.error) throw new Error(p.error.message);
  return JSON.parse(p.result?.content?.[0]?.text);
}

async function callMcpTool(toolName, args) {
  if (!mcpSessionId) await mcpInit();
  const mcpName = toolName.replace('ibp_','ibp.');
  const headers = { 'Content-Type':'application/json', 'Accept':'application/json, text/event-stream' };
  if (mcpSessionId) headers['Mcp-Session-Id'] = mcpSessionId;
  const resp = await fetch(MCP_BASE, {
    method: 'POST', headers,
    body: JSON.stringify({ jsonrpc:'2.0', id: Date.now(), method:'tools/call', params:{ name: mcpName, arguments: args } })
  });
  const text = await resp.text();
  return parseSSE(text);
}

// Agent loop
async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || !apiKey) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  document.getElementById('suggestions').style.display = 'none';

  appendMsg('user', text);
  conversationHistory.push({ role: 'user', content: text });

  appendThinking();

  try {
    await agentLoop();
  } catch(e) {
    removeThinking();
    appendMsg('assistant', '⚠ Error: ' + e.message);
  }

  document.getElementById('send-btn').disabled = false;
}

async function agentLoop() {
  while (true) {
    const resp = await fetch(ANTHROPIC_API, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        tools: IBP_TOOLS,
        messages: conversationHistory
      })
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error?.message || 'API error ' + resp.status);
    }

    const data = await resp.json();
    removeThinking();

    // Collect assistant message
    conversationHistory.push({ role: 'assistant', content: data.content });

    if (data.stop_reason === 'end_turn') {
      const textBlock = data.content.find(b => b.type === 'text');
      if (textBlock) appendMsg('assistant', textBlock.text);
      break;
    }

    if (data.stop_reason === 'tool_use') {
      // Show any text before tool calls
      const textBlock = data.content.find(b => b.type === 'text');
      if (textBlock?.text) appendMsg('assistant', textBlock.text);

      // Process tool calls
      const toolUseBlocks = data.content.filter(b => b.type === 'tool_use');
      const toolResults = [];

      for (const toolUse of toolUseBlocks) {
        // Show tool call
        const callDiv = document.createElement('div');
        callDiv.innerHTML = `<div class="tool-call"><div class="tool-name">⚙ ${toolUse.name}</div><div class="tool-args">${JSON.stringify(toolUse.input, null, 2)}</div></div>`;
        appendMsg('assistant', callDiv);

        appendThinking();

        let resultText;
        try {
          const result = await callMcpTool(toolUse.name, toolUse.input);
          resultText = JSON.stringify(result, null, 2);

          // Show result
          removeThinking();
          const resDiv = document.createElement('div');
          resDiv.innerHTML = `<div class="tool-result">${resultText}</div>`;
          appendMsg('assistant', resDiv);
        } catch(e) {
          removeThinking();
          resultText = 'Error: ' + e.message;
          const resDiv = document.createElement('div');
          resDiv.innerHTML = `<div class="tool-result" style="border-left-color:var(--red)">${resultText}</div>`;
          appendMsg('assistant', resDiv);
        }

        toolResults.push({
          type: 'tool_result',
          tool_use_id: toolUse.id,
          content: resultText
        });
      }

      conversationHistory.push({ role: 'user', content: toolResults });
      appendThinking();
      // loop continues → Claude processes results and replies
    }
  }
}
</script>
</body>
</html>
